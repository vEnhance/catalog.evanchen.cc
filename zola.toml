# The URL the site will be built for
base_url = "https://catalog.evanchen.cc"

# Site title (used in <title> and header fallbacks)
title = "OTIS Unit Catalog"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

[markdown]

[markdown.highlighting]
theme = "catppuccin-mocha"

[extra]
# Source repository (used for "edit on GitHub" links / pull requests)
github_repo = "https://github.com/vEnhance/catalog.evanchen.cc"
github_branch = "main"

# Artwork host. Images live at <base>/{webp,thumb-md,thumb-sm}/<slug>.webp
# (full size / 226x226 / 104x104).
gallery_base = "https://gallery.evanchen.cc"
